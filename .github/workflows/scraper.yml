name: Scraper

on:
  schedule:
    # Cada 6 horas (UTC). Guatemala = UTC-6, así que serán 00:00, 06:00, 12:00, 18:00 hora local.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      super:
        description: "Slug del supermercado (walmart, maxi-despensa, la-torre, paiz)"
        required: true
        default: "walmart"
      mock:
        description: "Usar datos mock en vez de scrapear"
        type: boolean
        default: false

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: scraper

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ inputs.mock }}" = "true" ]; then
            python main.py --super "${{ inputs.super || 'walmart' }}" --mock
          else
            python main.py --super "${{ inputs.super || 'walmart' }}"
          fi
